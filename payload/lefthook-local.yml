# Personal hook wiring for the verify-ui (Android) harness — injected by
# `/omakase init`, gitignored via .git/info/exclude (never committed). This one
# file IS your harness: read it top to bottom to see everything that runs.
#
# Every gate is one omakase-gate.sh call. That script (and the banner) come from the
# omakase BASE harness, layered in underneath this harness's files at install time —
# this harness ships none of the base machinery itself, only its own delta. Flags pick
# the gate shape:
#   (default)     run the --step every time; non-zero blocks. Good for fast checks.
#   --cacheable   run once per commit, then reuse the pass (skip) until HEAD moves.
#   --glob 'PATS' only run when a changed file in the range matches a pattern.
#   --record      (out of band) write a pass for the current commit without a step.
# A "deferred" gate is just --cacheable + a step that blocks: the step refuses, an agent
# or human runs the real check and then `omakase-gate.sh <name> --record`, and the re-push
# at the same commit is allowed. The per-gate audited bypass is OMAKASE_SKIP_<NAME>=1.

output: [summary, success, failure, execution_out]

pre-commit:
  jobs:
    # Branded header box (opt-in; enforces nothing). Runs first; its only output is the box.
    - name: omakase-banner
      run: bash .omakase/bin/omakase-banner.sh pre-commit
    # Generic scoped checker: block a staged merge-conflict marker. Runs every commit.
    - name: omakase-example
      run: bash .omakase/bin/omakase-gate.sh omakase-example --step 'bash .omakase/gates/example.sh'

pre-push:
  jobs:
    - name: omakase-banner
      run: bash .omakase/bin/omakase-banner.sh pre-push
    # verify-ui deferred gate: blocks the push unless /verify-ui recorded a fresh PASS for
    # the exact commit, and only when the push touches UI source. The hook does NOT run the
    # emulator — /verify-ui runs it out of band at done-time and records the pass with --record.
    - name: verify-ui
      run: bash .omakase/bin/omakase-gate.sh verify-ui --cacheable --glob '*/src/*' --step 'echo "BLOCKED - run /verify-ui at done-time, then push again" >&2; exit 1'

# Worktree auto-install: copy any MISSING injected file into this worktree from the
# shared snapshot on every checkout. Never overwrites a local edit. Written by init.sh.
post-checkout:
  jobs:
    - name: omakase-ensure-present
      run: bash "$(git rev-parse --git-common-dir)/omakase/ensure-present.sh"
