# Personal hook wiring for the verify-ui (Android) harness — injected by
# `/omakase init`, gitignored via .git/info/exclude (never committed). This one
# file IS your harness: read it top to bottom to see everything that runs.
#
#   scoped checkers   — fast, staged-file-scoped; run per-commit (pre-commit).
#   complete checkers — whole-project / done-time; recorded verdicts read per-push.

output: [summary, success, failure, execution_out]

pre-commit:
  jobs:
    # Branded header box (replaces lefthook's). Runs first; its only output is the box.
    - name: omakase-banner
      run: bash .omakase/bin/omakase-banner.sh pre-commit
    # Generic scoped checker: blocks staged merge-conflict markers.
    - name: omakase-example
      run: bash .omakase/bin/omakase-ledger.sh omakase-example -- bash .omakase/gates/example.sh
      env:
        OMAKASE_HOOK: pre-commit

pre-push:
  jobs:
    - name: omakase-banner
      run: bash .omakase/bin/omakase-banner.sh pre-push
    # verify-ui deferred gate: blocks the push unless /verify-ui recorded a fresh
    # PASS for the exact commit, when the push touches UI source. The hook does NOT
    # run the emulator — it reads the verdict /verify-ui wrote at done-time.
    - name: verify-ui
      run: bash .omakase/bin/omakase-ledger.sh verify-ui -- bash .omakase/gates/deferred-check.sh
      env:
        OMAKASE_CHECK: verify-ui
        OMAKASE_GLOB: '*/src/*'   # any Kotlin/Java source path; narrow to your UI modules if you like
        OMAKASE_HOOK: pre-push

# Worktree auto-install: copy any MISSING injected file into this worktree from the
# shared snapshot on every checkout. Never overwrites a local edit. Written by init.sh.
post-checkout:
  jobs:
    - name: omakase-ensure-present
      run: bash "$(git rev-parse --git-common-dir)/omakase/ensure-present.sh"
